services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - cache:/app/.cache
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://192.168.97.3:3000

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  cache:
